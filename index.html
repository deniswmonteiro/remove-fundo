<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Removedor de Fundo Profissional - Logo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .bg-checkered {
      background-color: #f0f0f0;
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
      border-radius: 0.5rem;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans p-6">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
        <h1 class="text-2xl font-bold text-center text-pink-600 mb-2">Remove Fundo</h1>
        
        <!-- Área de Upload -->
        <div class="flex flex-col items-center justify-center w-full mb-6">
            <label for="upload" class="flex flex-col items-center justify-center w-full h-40 border-2 border-pink-300 border-dashed rounded-lg cursor-pointer bg-pink-50 hover:bg-pink-100 transition">
                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                    <svg class="w-10 h-10 mb-3 text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="mb-2 text-sm text-gray-600"><span class="font-semibold text-pink-600">Clique para enviar a logo</span></p>
                    <p class="text-xs text-gray-400 italic">Dica: Se sobrar branco, aumente a tolerância.</p>
                </div>
                <input id="upload" type="file" class="hidden" accept="image/*" />
            </label>
        </div>

        <!-- Controles Avançados -->
        <div id="controls" class="hidden flex-col items-center mb-8 bg-gray-50 p-6 rounded-xl border border-gray-200">
            <div class="w-full max-w-md">
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-bold text-gray-700">Tolerância do Branco</label>
                    <span id="tolerance-val" class="text-pink-600 font-mono">230</span>
                </div>
                <input id="tolerance" type="range" min="150" max="254" value="230" class="w-full h-2 bg-pink-200 rounded-lg appearance-none cursor-pointer mb-6">

                <div class="flex justify-between mb-2">
                    <label class="text-sm font-bold text-gray-700">Suavização de Borda (Anti-aliasing)</label>
                    <span id="smooth-val" class="text-pink-600 font-mono">15</span>
                </div>
                <input id="smooth" type="range" min="0" max="50" value="15" class="w-full h-2 bg-pink-200 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>

        <!-- Resultado -->
        <div id="result-container" class="hidden flex-col items-center">
            <h2 class="text-lg font-semibold text-gray-700 mb-4 text-center">Pré-visualização (Fundo Transparente)</h2>

            <div class="bg-checkered p-8 inline-block max-w-full overflow-hidden shadow-inner mb-6 border border-gray-200">
                <img id="result-image" class="max-w-full h-auto object-contain" alt="Logo sem fundo" />
            </div>

            <div class="flex gap-4">
                <button onclick="location.reload()" class="px-6 py-3 bg-gray-200 text-gray-700 font-bold rounded-full hover:bg-gray-300 transition">Trocar Imagem</button>
                <a id="download-btn" class="px-8 py-3 bg-pink-600 text-white font-bold rounded-full shadow-lg hover:bg-pink-700 transition flex items-center gap-2 transform hover:scale-105" download="logo_limpa.png">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Baixar em Alta Resolução
                </a>
            </div>
        </div>
    </div>

    <script>
        const inputUpload = document.getElementById('upload');
        const toleranceSlider = document.getElementById('tolerance');
        const smoothSlider = document.getElementById('smooth');
        const toleranceValText = document.getElementById('tolerance-val');
        const smoothValText = document.getElementById('smooth-val');
        const controls = document.getElementById('controls');
        const resultContainer = document.getElementById('result-container');
        const resultImage = document.getElementById('result-image');
        const downloadBtn = document.getElementById('download-btn');

        let originalImage = new Image();

        inputUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage.onload = () => {
                    controls.classList.remove('hidden');
                    controls.classList.add('flex');
                    resultContainer.classList.remove('hidden');
                    resultContainer.classList.add('flex');
                    processImage();
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        [toleranceSlider, smoothSlider].forEach(slider => {
            slider.addEventListener('input', () => {
                toleranceValText.innerText = toleranceSlider.value;
                smoothValText.innerText = smoothSlider.value;
                processImage();
            });
        });

        function processImage() {
            if (!originalImage.src) return;

            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });

            ctx.drawImage(originalImage, 0, 0);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;

            const tolerance = parseInt(toleranceSlider.value);
            const smoothRange = parseInt(smoothSlider.value);
            const lowerBound = tolerance - smoothRange;

            let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
            let hasContent = false;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // Média de brilho do pixel
                const brightness = (r + g + b) / 3;

                if (brightness >= tolerance) {
                    // Branco total ou acima da tolerância
                    data[i + 3] = 0;
                } else if (brightness > lowerBound) {
                    // Zona de suavização (transparência gradual)
                    // Quanto mais perto do branco, mais transparente
                    const diff = brightness - lowerBound;
                    const alpha = 255 * (1 - (diff / smoothRange));
                    data[i + 3] = alpha;

                    // Se ainda tiver opacidade considerável, conta como conteúdo para o corte
                    if (alpha > 50) markContent(i);
                } else {
                    markContent(i);
                }
            }

            function markContent(index) {
                hasContent = true;
                const x = (index / 4) % canvas.width;
                const y = Math.floor((index / 4) / canvas.width);
                if (x < minX) minX = x;
                if (y < minY) minY = y;
                if (x > maxX) maxX = x;
                if (y > maxY) maxY = y;
            }

            if (!hasContent) return;

            ctx.putImageData(imgData, 0, 0);

            // Corte inteligente
            const margin = 15;
            minX = Math.max(0, minX - margin);
            minY = Math.max(0, minY - margin);
            maxX = Math.min(canvas.width, maxX + margin);
            maxY = Math.min(canvas.height, maxY + margin);

            const cropWidth = maxX - minX;
            const cropHeight = maxY - minY;

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = cropWidth;
            cropCanvas.height = cropHeight;
            const cropCtx = cropCanvas.getContext('2d');

            cropCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

            const dataUrl = cropCanvas.toDataURL('image/png');
            resultImage.src = dataUrl;
            downloadBtn.href = dataUrl;
        }
    </script>
</body>
</html>
